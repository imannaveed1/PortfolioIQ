[phases.setup]
nixPkgs = ["chromium", "chromium-driver", "glib", "nss", "nspr", "atk", "cups", "dbus", "expat", "libdrm", "libxcb", "libxkbcommon", "mesa", "pango", "cairo", "alsa-lib"]

[phases.install]
